<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f4f5f7;
      }
      #viewer {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <script src="jszip.min.js"></script>
    <script src="epub.min.js"></script>
    <script>
      let book, rendition;

      function post(type, payload) {
        window.ReactNativeWebView.postMessage(
          JSON.stringify({ type, payload }),
        );
      }

      function readLocalFile(fileUri) {
        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('GET', fileUri, true);
          xhr.responseType = 'arraybuffer';
          xhr.onload = () => {
            if (xhr.status === 0 || xhr.status === 200) {
              resolve(xhr.response);
            } else {
              reject(new Error('xhr status ' + xhr.status));
            }
          };
          xhr.onerror = () => reject(new Error('xhr network error'));
          xhr.send();
        });
      }

      function loadBook(arrayBuffer, startCfi) {
        book = ePub(arrayBuffer);
        rendition = book.renderTo('viewer', {
          width: window.innerWidth,
          height: window.innerHeight,
          flow: 'paginated',
          spread: 'none',
        });
        rendition.display(startCfi || undefined);

        window.addEventListener('resize', () => {
          rendition && rendition.resize(window.innerWidth, window.innerHeight);
        });

        rendition.on('relocated', location => {
          const pct = book.locations.length()
            ? book.locations.percentageFromCfi(location.start.cfi)
            : 0;
          post('progress', { percent: pct, cfi: location.start.cfi });
        });

        rendition.on('rendered', () => post('ready', {}));

        book.ready
          .then(() => book.locations.generate(1000))
          .then(() => post('locationsReady', {}));

        attachSwipeHandlers(rendition);
      }

      // --- swipe-to-turn-page, tap-to-toggle-chrome ---
      function attachSwipeHandlers(rendition) {
        const SWIPE_THRESHOLD = 40; // px, minimum horizontal movement to count as a swipe
        const TAP_SLOP = 10; // px, max movement still considered a "tap"

        let startX = 0;
        let startY = 0;
        let tracking = false;
        let lastActionTime = 0;
        const DEDUPE_MS = 350; // ignore a second event firing right after one we already handled

        function onTouchStart(e) {
          const t = e.touches ? e.touches[0] : e;
          startX = t.clientX;
          startY = t.clientY;
          tracking = true;
        }

        function onTouchEnd(e) {
          if (!tracking) return;
          tracking = false;

          const now = Date.now();
          if (now - lastActionTime < DEDUPE_MS) return;

          const t = e.changedTouches ? e.changedTouches[0] : e;
          const dx = t.clientX - startX;
          const dy = t.clientY - startY;
          const absDx = Math.abs(dx);
          const absDy = Math.abs(dy);

          // Horizontal swipe: turn page. Ignore if mostly vertical
          // (accidental scroll/drag).
          if (absDx > SWIPE_THRESHOLD && absDx > absDy) {
            lastActionTime = now;
            if (dx < 0) {
              nextPage();
            } else {
              prevPage();
            }
            return;
          }

          // Otherwise, if it barely moved at all, treat as a tap.
          if (absDx < TAP_SLOP && absDy < TAP_SLOP) {
            lastActionTime = now;
            post('toggleChrome', {});
          }
        }

        // epub.js renders each page/spread inside its own iframe. This hook
        // fires every time new content is rendered, so we re-attach listeners
        // inside that iframe's document each time.
        rendition.hooks.content.register(contents => {
          const doc = contents.document;
          doc.addEventListener('touchstart', onTouchStart, { passive: true });
          doc.addEventListener('touchend', onTouchEnd, { passive: true });
        });
      }

      function extractCover(arrayBuffer) {
        const b = ePub(arrayBuffer);
        return b.ready
          .then(() => b.coverUrl())
          .then(url => {
            if (!url) {
              post('cover', { base64: null });
              return;
            }
            return fetch(url)
              .then(res => res.blob())
              .then(
                blob =>
                  new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                  }),
              )
              .then(dataUrl => {
                post('cover', { base64: dataUrl.split(',')[1] });
              });
          })
          .catch(err => {
            post('cover', { base64: null, error: String(err) });
          });
      }

      function nextPage() {
        rendition && rendition.next();
      }
      function prevPage() {
        rendition && rendition.prev();
      }

      document.addEventListener('message', handleMessage);
      window.addEventListener('message', handleMessage);

      function handleMessage(e) {
        const msg = JSON.parse(e.data);
        if (msg.type === 'next') nextPage();
        if (msg.type === 'prev') prevPage();
        if (msg.type === 'theme' && rendition) {
          rendition.themes.register('app', {
            body: { background: msg.payload.bg, color: msg.payload.text },
          });
          rendition.themes.select('app');
          document.body.style.background = msg.payload.bg;
        }
      }

      (function init() {
        const params = new URLSearchParams(window.location.search);
        const fileUri = params.get('src');
        const startCfi = params.get('cfi') || undefined;
        const mode = params.get('mode') || 'read';

        if (!fileUri) {
          console.error('epub-reader.html: missing src param');
          post('loadError', { message: 'missing src param' });
          return;
        }

        readLocalFile(fileUri)
          .then(buffer =>
            mode === 'cover'
              ? extractCover(buffer)
              : loadBook(buffer, startCfi),
          )
          .catch(err => {
            console.error('epub load error', err);
            post(mode === 'cover' ? 'cover' : 'loadError', {
              message: String(err),
            });
          });
      })();
    </script>
  </body>
</html>
