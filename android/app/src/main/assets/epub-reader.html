<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f4f5f7;
      }
      #viewer {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <script src="jszip.min.js"></script>
    <script src="epub.min.js"></script>
    <script>
      let book, rendition;

      function post(type, payload) {
        window.ReactNativeWebView.postMessage(
          JSON.stringify({ type, payload }),
        );
      }

      function readLocalFile(fileUri) {
        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('GET', fileUri, true);
          xhr.responseType = 'arraybuffer';
          xhr.onload = () => {
            if (xhr.status === 0 || xhr.status === 200) {
              resolve(xhr.response);
            } else {
              reject(new Error('xhr status ' + xhr.status));
            }
          };
          xhr.onerror = () => reject(new Error('xhr network error'));
          xhr.send();
        });
      }

      function loadBook(arrayBuffer, startCfi) {
        book = ePub(arrayBuffer);
        rendition = book.renderTo('viewer', {
          width: '100%',
          height: '100%',
          flow: 'paginated',
          spread: 'none',
        });
        rendition.display(startCfi || undefined);

        rendition.on('relocated', location => {
          const pct = book.locations.length()
            ? book.locations.percentageFromCfi(location.start.cfi)
            : 0;
          post('progress', { percent: pct, cfi: location.start.cfi });
        });

        rendition.on('rendered', () => post('ready', {}));

        book.ready
          .then(() => book.locations.generate(1000))
          .then(() => post('locationsReady', {}));

        rendition.on('click', event => {
          const width = window.innerWidth;
          const x = event.clientX;

          if (x < width * 0.25) {
            prevPage();
          } else if (x > width * 0.75) {
            nextPage();
          } else {
            post('toggleChrome', {});
          }
        });
      }

      function nextPage() {
        rendition && rendition.next();
      }
      function prevPage() {
        rendition && rendition.prev();
      }

      document.addEventListener('message', handleMessage);
      window.addEventListener('message', handleMessage);

      function handleMessage(e) {
        const msg = JSON.parse(e.data);
        if (msg.type === 'next') nextPage();
        if (msg.type === 'prev') prevPage();
      }

      (function init() {
        const params = new URLSearchParams(window.location.search);
        const fileUri = params.get('src');
        const startCfi = params.get('cfi') || undefined;

        if (!fileUri) {
          console.error('epub-reader.html: missing src param');
          post('loadError', { message: 'missing src param' });
          return;
        }

        readLocalFile(fileUri)
          .then(buffer => loadBook(buffer, startCfi))
          .catch(err => {
            console.error('epub load error', err);
            post('loadError', { message: String(err) });
          });
      })();
    </script>
  </body>
</html>
