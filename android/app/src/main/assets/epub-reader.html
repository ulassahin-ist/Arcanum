<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f4f5f7;
      }
      #viewer {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.93/epub.min.js"></script>
    <script>
      let book, rendition;

      function post(type, payload) {
        window.ReactNativeWebView.postMessage(
          JSON.stringify({ type, payload }),
        );
      }

      function loadBook(base64Data, startCfi) {
        book = ePub(base64ToArrayBuffer(base64Data));
        rendition = book.renderTo('viewer', {
          width: '100%',
          height: '100%',
          flow: 'paginated',
          spread: 'none',
        });
        rendition.display(startCfi || undefined);

        rendition.on('relocated', location => {
          const pct = book.locations.length()
            ? book.locations.percentageFromCfi(location.start.cfi)
            : 0;
          post('progress', { percent: pct, cfi: location.start.cfi });
        });

        rendition.on('rendered', () => post('ready', {}));

        book.ready
          .then(() => {
            return book.locations.generate(1000);
          })
          .then(() => {
            post('locationsReady', {});
          });

        rendition.on('click', () => post('toggleChrome', {}));
      }

      function base64ToArrayBuffer(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return bytes.buffer;
      }

      function nextPage() {
        rendition && rendition.next();
      }
      function prevPage() {
        rendition && rendition.prev();
      }

      document.addEventListener('message', handleMessage);
      window.addEventListener('message', handleMessage);

      function handleMessage(e) {
        const msg = JSON.parse(e.data);
        if (msg.type === 'load')
          loadBook(msg.payload.base64, msg.payload.startCfi);
        if (msg.type === 'next') nextPage();
        if (msg.type === 'prev') prevPage();
      }
    </script>
  </body>
</html>
